<!DOCTYPE html>
<html>
<head>
    <title>Verse Cleaner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Verse Cleaner">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="container">
        <h1>Verse Cleaner</h1>
        <textarea id="input" rows="15" cols="50"></textarea>
        <div id="button-container">
            <button onclick="clean()" ontouchstart="">Clean</button>
        </div>
        <h2 id="verse_ref"></h2>
        <textarea id="output" rows="15" cols="50"></textarea>
        <div id="button-container">
            <button onclick="copy()" ontouchstart="">Copy</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/your-repo-name/sw.js');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
